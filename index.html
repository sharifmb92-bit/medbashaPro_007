<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#0f172a">
    <title>Med Basha Pro - Gestión de Jornada</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        input[type="time"] { color-scheme: dark; font-weight: 800; }
        .btn-press:active { transform: scale(0.97); transition: 0.1s; }
        .status-duda { animation: pulse-warn 2s infinite; background-color: #854d0e !important; }
        @keyframes pulse-warn { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="medBashaApp()" x-init="init()" x-cloak>

    <template x-if="screen === 1">
        <div class="flex flex-col h-full p-4 space-y-4">
            <header class="flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter italic">MED BASHA <span class="text-blue-500 not-italic text-sm">PRO</span></h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Supervisor de Jornada | Menorca</p>
                </div>
                <button @click="screen = 4" class="p-2 glass-card text-slate-400 btn-press"><span class="material-symbols-rounded">settings</span></button>
            </header>

            <div class="glass-card p-4 shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-extrabold text-blue-400 uppercase text-xs" x-text="mesNombre + ' ' + año"></span>
                    <div class="flex gap-4">
                        <button @click="cambiarMes(-1)" class="p-1"><span class="material-symbols-rounded">chevron_left</span></button>
                        <button @click="cambiarMes(1)" class="p-1"><span class="material-symbols-rounded">chevron_right</span></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center">
                    <template x-for="dia in diasCalendario" :key="dia.fecha">
                        <div @click="seleccionarDia(dia.fecha)" 
                             class="py-2 flex flex-col items-center cursor-pointer rounded-xl transition-all"
                             :class="dia.fecha === fechaSel ? 'bg-blue-500/20' : ''">
                            <span :class="dia.isHoy ? 'bg-blue-600 text-white rounded-full w-7 h-7 flex items-center justify-center' : 'text-slate-400'" 
                                  class="text-xs font-bold" x-text="dia.num"></span>
                            <div class="flex gap-0.5 mt-1 h-1">
                                <template x-if="estadoDia(dia.fecha) === 'continua'"><div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div></template>
                                <template x-if="estadoDia(dia.fecha) === 'partida'"><div class="w-1.5 h-1.5 rounded-full bg-orange-500"></div></template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button @click="abrirRegistro(false)" class="glass-card p-5 btn-press border-b-4 border-b-blue-600 flex flex-col items-center">
                    <span class="material-symbols-rounded text-blue-500 text-3xl">timer</span>
                    <p class="text-[10px] font-black uppercase mt-2 text-slate-300">C. Continua</p>
                </button>
                <button @click="abrirRegistro(true)" class="glass-card p-5 btn-press border-b-4 border-b-orange-600 flex flex-col items-center">
                    <span class="material-symbols-rounded text-orange-500 text-3xl">wb_twilight</span>
                    <p class="text-[10px] font-black uppercase mt-2 text-slate-300">T. Partida</p>
                </button>
            </div>

            <div class="flex-grow flex flex-col items-center justify-center" @click="screen = 3">
                <h2 class="text-7xl font-black tracking-tighter text-white" x-text="reloj"></h2>
                <div class="mt-2 px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                    <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Sistema de Nómina Activo</span>
                </div>
            </div>

            <button @click="screen = 3" class="w-full py-4 glass-card font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 btn-press">Consultar Historial Semanal</button>
        </div>
    </template>

    <template x-if="screen === 2">
        <div class="flex flex-col h-full p-4 space-y-4 overflow-hidden">
            <header class="flex items-center justify-between">
                <button @click="screen = 1" class="p-2 btn-press"><span class="material-symbols-rounded text-slate-400">arrow_back</span></button>
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-400" x-text="formatFechaLarga(fechaSel)"></span>
                <div class="w-10"></div>
            </header>

            <div class="flex-grow space-y-4 overflow-y-auto no-scrollbar pb-32">
                <div class="glass-card p-4 space-y-4 border-l-4 border-l-blue-500">
                    <div class="flex justify-between items-center border-b border-white/5 pb-2">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">Bloque Principal</span>
                        <input type="text" x-model="form.bus1" placeholder="Nº BUS" class="w-20 py-1 input-field text-yellow-500 font-black text-center text-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="input-field p-2"><label class="text-[8px] font-bold text-slate-500 uppercase block">Entrada</label><input type="time" x-model="form.hE1" @input="calc()" class="w-full bg-transparent text-blue-400 text-xl outline-none"></div>
                        <div class="input-field p-2"><label class="text-[8px] font-bold text-slate-500 uppercase block">Salida</label><input type="time" x-model="form.hS1" @input="calc()" class="w-full bg-transparent text-blue-400 text-xl outline-none"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-field p-2"><label class="text-[8px] font-bold text-cyan-600 uppercase block">KM Inicio</label><input type="number" x-model="form.kI1" @input="calc()" class="w-full bg-transparent text-white font-bold text-center outline-none"></div>
                        <div class="input-field p-2"><label class="text-[8px] font-bold text-cyan-600 uppercase block">KM Fin</label><input type="number" x-model="form.kF1" @input="calc()" class="w-full bg-transparent text-white font-bold text-center outline-none"></div>
                    </div>
                </div>

                <template x-if="form.esP">
                    <div class="glass-card p-4 space-y-4 border-l-4 border-l-orange-500">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">Segundo Bloque</span>
                            <input type="text" x-model="form.bus2" placeholder="Nº BUS" class="w-20 py-1 input-field text-yellow-500 font-black text-center text-sm outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3 text-center">
                            <div class="input-field p-2"><label class="text-[8px] font-bold text-slate-500 uppercase block">Entrada</label><input type="time" x-model="form.hE2" @input="calc()" class="w-full bg-transparent text-orange-400 text-xl outline-none"></div>
                            <div class="input-field p-2"><label class="text-[8px] font-bold text-slate-500 uppercase block">Salida</label><input type="time" x-model="form.hS2" @input="calc()" class="w-full bg-transparent text-orange-400 text-xl outline-none"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="input-field p-2"><label class="text-[8px] font-bold text-cyan-600 uppercase block">KM Inicio</label><input type="number" x-model="form.kI2" @input="calc()" class="w-full bg-transparent text-white font-bold text-center outline-none"></div>
                            <div class="input-field p-2"><label class="text-[8px] font-bold text-cyan-600 uppercase block">KM Fin</label><input type="number" x-model="form.kF2" @input="calc()" class="w-full bg-transparent text-white font-bold text-center outline-none"></div>
                        </div>
                    </div>
                </template>

                <div class="grid grid-cols-2 gap-3">
                    <button @click="toggleD('comida')" :class="getDClass(form.comida)" class="p-4 rounded-2xl border flex flex-col items-center btn-press">
                        <span class="material-symbols-rounded text-2xl mb-1">restaurant</span>
                        <p class="text-[9px] font-black uppercase">Comida</p>
                    </button>
                    <button @click="toggleD('cena')" :class="getDClass(form.cena)" class="p-4 rounded-2xl border flex flex-col items-center btn-press">
                        <span class="material-symbols-rounded text-2xl mb-1">dinner_dining</span>
                        <p class="text-[9px] font-black uppercase">Cena</p>
                    </button>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 safe-bottom">
                <div class="glass-card p-4 flex justify-between items-center shadow-2xl border-t border-white/10">
                    <div>
                        <p class="text-[8px] font-bold text-slate-500 uppercase">Tiempo Total</p>
                        <p class="text-3xl font-black text-white" x-text="res.hT"></p>
                    </div>
                    <button @click="guardar()" class="bg-blue-600 h-14 w-14 rounded-2xl flex items-center justify-center btn-press shadow-lg shadow-blue-600/40">
                        <span class="material-symbols-rounded text-white text-3xl">check_circle</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="screen === 3">
        <div class="flex flex-col h-full p-4 space-y-4 overflow-hidden">
            <header class="flex items-center justify-between">
                <button @click="screen = 1" class="p-2 btn-press text-slate-400"><span class="material-symbols-rounded">arrow_back</span></button>
                <div class="text-center">
                    <h2 class="font-black uppercase text-[10px] tracking-widest text-blue-400">Cierre de Ciclo</h2>
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Ciclo 16 - 15</p>
                </div>
                <button @click="compartir()" class="p-2 text-green-500 btn-press"><span class="material-symbols-rounded">share</span></button>
            </header>

            <div class="grid grid-cols-2 gap-2">
                <div class="glass-card p-3 text-center border-l-4 border-l-blue-600"><p class="text-[7px] font-bold text-slate-500 uppercase">Horas Totales</p><p class="text-xl font-black text-white" x-text="totalMes.h"></p></div>
                <div class="glass-card p-3 text-center border-l-4 border-l-orange-500"><p class="text-[7px] font-bold text-slate-500 uppercase">Pluses Partida</p><p class="text-xl font-black text-white" x-text="totalMes.p"></p></div>
                <div class="glass-card p-3 text-center border-l-4 border-l-green-500"><p class="text-[7px] font-bold text-slate-500 uppercase">Dietas Acum.</p><p class="text-xl font-black text-white" x-text="totalMes.d"></p></div>
                <div class="glass-card p-3 text-center border-l-4 border-l-yellow-600"><p class="text-[7px] font-bold text-slate-500 uppercase">H. Nocturnas</p><p class="text-xl font-black text-white" x-text="totalMes.n"></p></div>
            </div>

            <hr class="border-white/5 mx-4">

            <div id="print-area" class="flex-grow overflow-y-auto space-y-4 pb-24 no-scrollbar">
                <template x-for="sem in historiaSemanas" :key="sem.num">
                    <div class="glass-card overflow-hidden">
                        <div class="bg-white/5 px-4 py-2 flex justify-between items-center border-b border-white/5">
                            <span class="text-[9px] font-black text-slate-400 uppercase" x-text="'SEMANA ' + sem.num"></span>
                            <div class="flex gap-3 text-[8px] font-black uppercase text-blue-400">
                                <span x-text="sem.tH.toFixed(2) + 'H'"></span>
                                <span class="text-green-500" x-text="sem.tD + ' DIETAS'"></span>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-center text-[10px]">
                                <thead class="text-[7px] text-slate-500 uppercase font-black opacity-60 bg-black/20">
                                    <tr>
                                        <th class="p-3 text-left">Día</th>
                                        <th>Bus</th>
                                        <th>Hora</th>
                                        <th>Dietas</th>
                                        <th>Noct.</th>
                                        <th class="p-3 text-right">KM</th>
                                    </tr>
                                </thead>
                                <tbody class="font-bold">
                                    <template x-for="item in sem.dias" :key="item.fecha">
                                        <tr class="border-t border-white/5">
                                            <td class="p-3 text-left">
                                                <div class="text-white" x-text="formatF(item.fecha)"></div>
                                                <div class="text-[6px] text-slate-500 uppercase" x-text="getDName(item.fecha)"></div>
                                            </td>
                                            <td class="text-yellow-500 text-[11px]" x-text="item.bus"></td>
                                            <td class="text-white font-black" x-text="item.hStr"></td>
                                            <td :class="item.dieta === '?' ? 'text-yellow-500' : 'text-green-400'" x-text="item.dieta"></td>
                                            <td class="text-yellow-600" x-text="item.noct"></td>
                                            <td class="p-3 text-right text-slate-400" x-text="item.km"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>
            </div>
            
            <button @click="pdf()" class="fixed bottom-4 left-4 right-4 py-4 glass-card font-black text-[10px] uppercase text-white bg-blue-600/10 btn-press border-t border-white/20 shadow-2xl">Descargar Reporte Mensual PDF</button>
        </div>
    </template>

    <template x-if="screen === 4">
        <div class="flex flex-col h-full p-4 space-y-6">
            <header class="flex items-center gap-4">
                <button @click="screen = 1" class="p-2 btn-press"><span class="material-symbols-rounded">arrow_back</span></button>
                <h2 class="font-black uppercase text-xs tracking-widest">Configuración</h2>
            </header>
            <div class="space-y-4">
                <div class="glass-card p-5 flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-slate-200">Supervisor de Turno</p>
                        <p class="text-[8px] text-slate-500 uppercase font-bold">Validación de Bus y Horas</p>
                    </div>
                    <div class="w-12 h-6 bg-blue-600 rounded-full flex items-center px-1 shadow-inner"><div class="w-4 h-4 bg-white rounded-full ml-auto"></div></div>
                </div>
                <button @click="reset()" class="w-full p-4 glass-card text-red-500 font-black text-[10px] uppercase tracking-widest border-red-900/20">Borrar Base de Datos</button>
            </div>
            <p class="mt-auto text-center text-[8px] text-slate-600 font-bold uppercase tracking-widest italic">Med Basha Pro v5.1 | Menorca Bus Edition</p>
        </div>
    </template>

    <script>
        function medBashaApp() {
            return {
                screen: 1, reloj: '', fechaSel: new Date().toISOString().split('T')[0],
                mes: new Date().getMonth(), año: new Date().getFullYear(), mesNombre: '',
                diasCalendario: [], history: [],
                form: { esP: false, bus1: '', bus2: '', hE1: '', hS1: '', kI1: '', kF1: '', hE2: '', hS2: '', kI2: '', kF2: '', comida: 'NO', cena: 'NO' },
                res: { hT: '00:00', nH: 0, kmD: 0 },
                totalMes: { h: 0, p: 0, d: 0, n: 0 },

                init() {
                    this.history = JSON.parse(localStorage.getItem('mb_v5_data') || '[]');
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                    this.renderCal();
                },

                updateTime() {
                    const n = new Date();
                    this.reloj = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
                },

                renderCal() {
                    const d = new Date(this.año, this.mes + 1, 0).getDate();
                    this.mesNombre = new Intl.DateTimeFormat('es-ES', {month:'long'}).format(new Date(this.año, this.mes));
                    this.diasCalendario = [];
                    for(let i=1; i<=d; i++) {
                        let f = `${this.año}-${String(this.mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                        this.diasCalendario.push({ num: i, fecha: f, isHoy: f === new Date().toISOString().split('T')[0] });
                    }
                },

                seleccionarDia(f) { this.fechaSel = f; this.renderCal(); },

                abrirRegistro(p) {
                    this.form = { esP: p, bus1: '', bus2: '', hE1: '', hS1: '', kI1: '', kF1: '', hE2: '', hS2: '', kI2: '', kF2: '', comida: 'NO', cena: 'NO' };
                    this.res = { hT: '00:00', nH: 0, kmD: 0 };
                    this.screen = 2;
                },

                calc() {
                    const toM = (t) => { if(!t) return 0; let [h,m]=t.split(':').map(Number); return h*60+m; };
                    let m1 = (toM(this.form.hS1) >= toM(this.form.hE1)) ? toM(this.form.hS1)-toM(this.form.hE1) : (toM(this.form.hS1)+1440)-toM(this.form.hE1);
                    let m2 = this.form.esP ? ((toM(this.form.hS2) >= toM(this.form.hE2)) ? toM(this.form.hS2)-toM(this.form.hE2) : (toM(this.form.hS2)+1440)-toM(this.form.hE2)) : 0;
                    let total = m1 + m2;
                    if(total > 0 && total < 360) total = 360; 

                    this.res.hT = Math.floor(total/60).toString().padStart(2,'0')+':'+(total%60).toString().padStart(2,'0');
                    this.res.kmD = (parseInt(this.form.kF1)-parseInt(this.form.kI1) || 0) + (this.form.esP ? (parseInt(this.form.kF2)-parseInt(this.form.kI2) || 0) : 0);
                    
                    let hF = this.form.esP ? (this.form.hS2 || this.form.hS1) : this.form.hS1;
                    if(hF) {
                        this.form.comida = (hF >= "15:00") ? "SI" : "NO";
                        if(hF >= "22:50" && hF < "23:00") this.form.cena = "DUDA";
                        else this.form.cena = (hF >= "23:00") ? "SI" : "NO";
                    }
                    this.res.nH = this.calcN(this.form.hE1, this.form.hS1) + (this.form.esP ? this.calcN(this.form.hE2, this.form.hS2) : 0);
                },

                calcN(i, s) {
                    if(!i || !s) return 0;
                    let mN = 0; let [hE,mE] = i.split(':').map(Number); let [hS,mS] = s.split(':').map(Number);
                    let cur = new Date(2000,0,1,hE,mE); let end = new Date(2000,0,1,hS,mS);
                    if(end <= cur) end.setDate(end.getDate()+1);
                    while(cur < end) { if(cur.getHours() >= 22 || cur.getHours() < 6) mN++; cur.setMinutes(cur.getMinutes()+1); }
                    return mN/60;
                },

                guardar() {
                    if(!this.form.bus1) { alert("⚠️ El Supervisor requiere el Nº BUS."); return; }
                    this.history = this.history.filter(h => h.fecha !== this.fechaSel);
                    let dVal = (this.form.comida === 'SI' ? 1 : 0) + (this.form.cena === 'SI' ? 1 : 0);
                    this.history.push({
                        fecha: this.fechaSel, bus: this.form.bus1, hStr: this.res.hT,
                        dieta: (this.form.comida === 'DUDA' || this.form.cena === 'DUDA') ? '?' : dVal,
                        km: this.res.kmD, noct: this.res.nH.toFixed(2), tipo: this.form.esP ? 'partida' : 'continua'
                    });
                    localStorage.setItem('mb_v5_data', JSON.stringify(this.history));
                    this.screen = 3;
                },

                get historiaSemanas() {
                    let filtrado = this.history.filter(h => {
                        let d = new Date(h.fecha); let m = d.getMonth(); let dia = d.getDate();
                        let mesNom = (dia >= 16) ? (m + 1) % 12 : m;
                        return mesNom === this.mes;
                    }).sort((a,b) => a.fecha.localeCompare(b.fecha));

                    this.totalMes = { h: 0, p: 0, d: 0, n: 0 };
                    let sems = {};
                    filtrado.forEach(h => {
                        let d = new Date(h.fecha);
                        let wk = Math.ceil(d.getDate() / 7);
                        if(!sems[wk]) sems[wk] = { num: wk, dias: [], tH: 0, tD: 0 };
                        sems[wk].dias.push(h);
                        let [hor,min] = h.hStr.split(':').map(Number);
                        sems[wk].tH += (hor + min/60); sems[wk].tD += (h.dieta === '?' ? 0 : h.dieta);
                        this.totalMes.h += (hor + min/60); this.totalMes.d += (h.dieta === '?' ? 0 : h.dieta);
                        this.totalMes.n += parseFloat(h.noct);
                        if(h.tipo === 'partida') this.totalMes.p++;
                    });
                    this.totalMes.h = this.totalMes.h.toFixed(2);
                    this.totalMes.n = this.totalMes.n.toFixed(2);
                    return Object.values(sems).reverse();
                },

                cambiarMes(v) { this.mes += v; if(this.mes<0){this.mes=11;this.año--} if(this.mes>11){this.mes=0;this.año++} this.renderCal(); },
                estadoDia(f) { return this.history.find(h => h.fecha === f)?.tipo || null; },
                getDClass(v) { 
                    if(v === 'SI') return 'bg-green-600/20 border-green-500 text-green-400 font-bold';
                    if(v === 'DUDA') return 'status-duda border-yellow-500 text-white font-black';
                    return 'bg-slate-800/40 border-slate-700 text-slate-500';
                },
                toggleD(t) { const s=['NO','SI','DUDA']; this.form[t] = s[(s.indexOf(this.form[t])+1)%3]; },
                formatF(f) { return f.split('-')[2] + '/' + f.split('-')[1]; },
                getDName(f) { return new Intl.DateTimeFormat('es-ES', {weekday:'short'}).format(new Date(f)); },
                formatFechaLarga(f) { return new Intl.DateTimeFormat('es-ES', {weekday:'long', day:'numeric', month:'long'}).format(new Date(f)); },
                compartir() { window.open(`https://wa.me/?text=${encodeURIComponent('Nómina Med Basha: '+this.totalMes.h+'h totales.')}`); },
                pdf() { html2pdf().from(document.getElementById('print-area')).save(`Nomina_${this.mesNombre}.pdf`); },
                reset() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
            }
        }
    </script>
</body>
</html>
